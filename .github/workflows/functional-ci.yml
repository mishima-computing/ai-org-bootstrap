name: Functional CI

on:
  push:
    branches:
      - main
      - pack-ci
      - genius-v2-phase0
  pull_request:

permissions:
  contents: read

jobs:
  functional:
    name: Functional checks
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate bootstrap pack
        run: python3 scripts/validate-bootstrap-pack.py

      - name: Extract Claude result self-test
        run: python3 scripts/extract-claude-result.py --self-test
