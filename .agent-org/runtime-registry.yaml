version: 0.1

note: This registry is executable routing metadata for the bootstrap pack. Canonical role behavior lives in `roles/*.md`. Carrier-specific adapters live in `.codex/agents/`, `.claude/agents/`, and `.antigravity/agents/`.

carriers:
  codex:
    status: active
    config_dir: .codex
    agents_dir: .codex/agents
    skills_dir: .agents/skills
    default_sandbox: read-only
    max_depth: 1
    purpose:
      - supervisor
      - workspace-gatekeeper
      - convergence-manager
      - work-packet-dispatcher
      - experiment-designer
      - boring-worker
      - codex-auditor
      - gate-report-builder
  claude:
    status: active
    config_dir: .claude
    agents_dir: .claude/agents
    skills_dir: .claude/skills
    default_permission_mode: plan
    purpose:
      - critical-surface-manager
      - mapmaker-agent
      - design-space-searcher
      - invariant-scout
      - auth-security-implementer
      - database-implementer
      - claude-independent-auditor
  antigravity:
    status: provisional
    config_dir: .antigravity
    agents_dir: .antigravity/agents
    skills_dir: .antigravity/skills
    allowed_initial_use:
      - visual-review
      - browser-evidence
      - ui-exploration
    prohibited_initial_use:
      - authentication
      - authorization
      - database
      - production
      - deployment
      - secrets
      - final-audit
      - adoption-authority

roles:
  bootstrap-supervisor:
    primary: codex-main
    write_capable: true
    requires_worktree: false
    adoption_authority: true
  workspace-gatekeeper:
    primary: codex
    secondary: claude
    write_capable: false
    requires_worktree: false
  convergence-manager:
    primary: codex
    secondary: claude
    write_capable: false
    requires_worktree: false
  work-packet-dispatcher:
    primary: codex
    write_capable: false
    requires_worktree: false
  critical-surface-manager:
    primary: claude
    secondary: codex
    write_capable: false
    requires_worktree: false
  mapmaker-agent:
    primary: claude
    secondary: antigravity
    tertiary: codex
    write_capable: false
    requires_worktree: false
  design-space-searcher:
    primary: claude
