    write_capable: false
    requires_worktree: false
  invariant-scout:
    primary: claude
    secondary: codex
    write_capable: false
    requires_worktree: false
  experiment-designer:
    primary: codex
    secondary: claude
    write_capable: false
    requires_worktree: false
  boring-worker:
    primary: codex
    secondary: claude
    write_capable: true
    requires_worktree: true
  auth-security-implementer:
    primary: claude
    secondary: codex
    write_capable: true
    requires_worktree: true
  database-implementer:
